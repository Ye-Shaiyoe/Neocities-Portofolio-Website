<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign the guestbook. A forgotten corner of the wired. Serial Experiments Lain inspired.">
    <title>guestbook — layer 07</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Layers -->
    <div class="bg-layer bg-wallpaper"></div>
    <div class="bg-layer bg-vignette"></div>
    <div class="bg-layer bg-texture"></div>
    <div class="bg-layer bg-scanlines"></div>
    <div class="bg-layer bg-noise"></div>
    <div class="bg-layer bg-glitch"></div>

    <!-- Floating Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Cryptic Floating Text -->
    <div class="cryptic-float">layer:07</div>
    <div class="cryptic-float">guestbook</div>
    <div class="cryptic-float">...sign...</div>

    <div class="page-wrapper">
        <div class="container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="profile-section">
                    <div class="profile-avatar">
                        <img id="sidebarImg" src="../img/lain.jpg" alt="lain">
                        <div class="profile-avatar-vignette"></div>
                    </div>
                </div>

                <div class="sidebar-divider"></div>

                <div class="sidebar-nav">
                    <a href="../index.html" class="nav-btn">← home</a>
                    <a href="#form" class="nav-btn">sign</a>
                    <a href="#entries" class="nav-btn">entries</a>
                </div>

                <div class="sidebar-status">
                    <p class="status-text">lost in the wired</p>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="content-area">
                <!-- Header Section -->
                <header class="header">
                    <h1 class="title">guestbook</h1>
                    <p class="subtitle">leave a trace...</p>
                </header>

                <!-- Character Display -->
                <div class="character-display">
                    <div class="character-wrapper">
                        <img id="characterImg" src="../img/lain-sit.png" alt="lain" class="character-image">
                    </div>
                    <div class="cryptic-msg" id="glitchText">...hello...</div>
                </div>

                <!-- Form Section -->
                <section class="form-section" id="form">
                    <h2 class="section-title">sign the book</h2>

                    <form id="guestbookForm" class="form">
                        <div class="form-group">
                            <label for="name" class="form-label">name:</label>
                            <input type="text" id="name" class="form-input" placeholder="anonymous visitor..." required>
                            <span class="error-msg" id="nameError"></span>
                        </div>

                        <div class="form-group">
                            <label for="email" class="form-label">email:</label>
                            <input type="email" id="email" class="form-input" placeholder="optional">
                        </div>

                        <div class="form-group">
                            <label for="message" class="form-label">message:</label>
                            <textarea id="message" class="form-textarea" placeholder="leave your mark..." required></textarea>
                            <span class="error-msg" id="messageError"></span>
                        </div>

                        <div class="form-buttons">
                            <button type="submit" class="btn btn-submit">sign</button>
                            <button type="reset" class="btn btn-reset">clear</button>
                        </div>
                    </form>
                </section>

                <!-- Entries Section -->
                <section class="entries-section" id="entries">
                    <div class="entries-header">
                        <h2 class="section-title">entries</h2>
                        <span class="entry-count" id="entryCount">0</span>
                    </div>

                    <div id="entriesList" class="entries-list">
                        <div class="no-entries">
                            <p>no entries yet... be the first visitor.</p>
                        </div>
                    </div>
                </section>

                <!-- Footer -->
                <footer class="footer">
                    <p class="footer-text">—— end of layer ——</p>
                </footer>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
